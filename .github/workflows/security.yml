name: Security

on:
  pull_request:
    paths:
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/security.yml"
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Audit production dependencies (fail on high)
        run: npm audit --omit=dev --audit-level=high

      - name: Audit all dependencies (informational)
        if: always()
        run: npm audit --audit-level=low || true
